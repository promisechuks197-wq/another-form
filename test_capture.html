<!DOCTYPE html>
<html>
<head>
<title>Console Capture</title>
<style>body{font-family:monospace;padding:20px;background:#000;color:#0f0;font-size:11px;}</style>
</head>
<body>
<h2>Console Output</h2>
<pre id="out"></pre>
<iframe id="f" src="index.html" width="1200" height="600" style="border:1px solid red;display:block;margin-top:20px"></iframe>
<script>
const out = document.getElementById('out');
const origLog = console.log;
const origErr = console.error;
const origWarn = console.warn;
function add(prefix, args) {
  const msg = Array.from(args).map(a => typeof a === 'object' ? JSON.stringify(a) : String(a)).join(' ');
  out.textContent += '[' + prefix + '] ' + msg + '\n';
  out.scrollTop = out.scrollHeight;
}
console.log = function() { add('LOG', arguments); origLog.apply(console, arguments); };
console.error = function() { add('ERROR', arguments); origErr.apply(console, arguments); };
console.warn = function() { add('WARN', arguments); origWarn.apply(console, arguments); };
window.addEventListener('error', (e) => add('GLOBAL_ERROR', [e.message + ' at ' + e.filename + ':' + e.lineno]));

const f = document.getElementById('f');
f.addEventListener('load', () => {
  setTimeout(() => {
    try {
      const w = f.contentWindow;
      // Override child's console
      w.console.log = function() { add('CHILD_LOG', arguments); };
      w.console.error = function() { add('CHILD_ERROR', arguments); };
      w.console.warn = function() { add('CHILD_WARN', arguments); };
      w.addEventListener('error', (e) => add('CHILD_GLOBAL_ERROR', [e.message + ' at line ' + e.lineno + ' col ' + e.colno]));
      
      // Now click admin tab
      setTimeout(() => {
        const doc = f.contentDocument;
        out.textContent += '\n--- About to click admin tab ---\n';
        doc.getElementById('tab-admin').click();
        setTimeout(() => {
          out.textContent += 'Form active: ' + doc.getElementById('section-form').classList.contains('active') + '\n';
          out.textContent += 'Admin login active: ' + doc.getElementById('section-admin-login').classList.contains('active') + '\n';
          out.textContent += 'Admin login display: ' + w.getComputedStyle(doc.getElementById('section-admin-login')).display + '\n';
          out.textContent += 'Form display: ' + w.getComputedStyle(doc.getElementById('section-form')).display + '\n';
        }, 500);
      }, 1000);
    } catch(e) {
      add('TEST_ERROR', [e.message]);
    }
  }, 2000);
});
</script>
</body>
</html>
